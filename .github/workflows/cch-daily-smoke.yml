name: cch daily smoke

on:
  schedule:
    - cron: "0 2 * * *" # 10:00 Asia/Shanghai
  workflow_dispatch:
    inputs:
      AmountSats:
        description: "Amount used by each direction, in sats / mzBTC minimum units"
        default: "100"

permissions:
  contents: read

jobs:
  cch-daily-smoke:
    runs-on: [self-hosted, test-new-02]
    timeout-minutes: 60
    env:
      CCH_SMOKE_ENABLED: "1"
      CCH_SMOKE_FNN_CLI: /home/ckb/fiber-test/testnet/node1/fnn-cli
      CCH_SMOKE_F1_RPC: http://127.0.0.1:8227
      CCH_SMOKE_F2_RPC: http://127.0.0.1:8229
      CCH_SMOKE_LND_A_CONTAINER: lnd-a
      CCH_SMOKE_LND_B_CONTAINER: lnd-b
      CCH_SMOKE_LND_DIR: /data/.lnd
      CCH_SMOKE_LND_NETWORK: testnet4
      CCH_SMOKE_AMOUNT_SATS: ${{ github.event.inputs.AmountSats || '100' }}
      CCH_SMOKE_FNN_AUTH_TOKEN: ${{ secrets.CCH_SMOKE_FNN_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - name: Update and verify Fiber nodes
        run: scripts/update_fnn.sh

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run CCH daily smoke
        run: |
          if [ -z "${CCH_SMOKE_FNN_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing repository secret CCH_SMOKE_FNN_AUTH_TOKEN."
            exit 1
          fi
          python -m pytest -vv -s
